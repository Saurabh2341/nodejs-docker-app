<!DOCTYPE ht
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenkins Test Page</title>
 
    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f4f6f8;

            text-align: center;

            margin-top: 100px;

        }
 
        .container {

            background: white;

            padding: 40px;

            width: 500px;

            margin: auto;

            border-radius: 10px;

            box-shadow: 0 0 10px rgba(0,0,0,0.1);

        }
 
        h1 {

            color: #d33833;

        }
 
        p {

            font-size: 18px;

        }
 
        .status {

            margin-top: 20px;

            padding: 10px;

            background: #e6ffe6;

            border: 1px solid #00cc66;

            border-radius: 5px;

            color: #006600;

        }
 
        button {

            padding: 10px 20px;

            background-color: #d33833;

            border: none;

            color: white;

            border-radius: 5px;

            cursor: pointer;

        }
 
        button:hover {

            background-color: #a62825;

        }
</style>
</head>
 
<body>
 
<div class="container">
<h1>Jenkins Deployment Test</h1>
 
    <p>This webpage is deployed using Jenkins CI/CD pipeline.</p>
 
    <div class="status">

        ✔ Build Successful
</div>
 
    <br>
 
    <button onclick="showMessage()">Test Button</button>
 
    <p id="message"></p>
</div>
 
<script>

function showMessage() {

    document.getElementById("message").innerHTML = 

    "Jenkins Pipeline is working correctly!";

}
</script>
 
</body>
</html>
